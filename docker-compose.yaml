version: '3.8'

services:
  # ── Hadoop ──────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode3
    ports:
      - '9872:9870' 
      - '9020:9000' 
    environment:
      - CLUSTER_NAME=${CLUSTER_NAME}
      - HDFS_NAMENODE_USER=${HDFS_NAMENODE_USER}
      - HDFS_DATANODE_USER=${HDFS_DATANODE_USER}
      - HDFS_SECONDARYNAMENODE_USER=${HDFS_SECONDARYNAMENODE_USER}
      - YARN_RESOURCEMANAGER_USER=${YARN_RESOURCEMANAGER_USER}
      - YARN_NODEMANAGER_USER=${YARN_NODEMANAGER_USER}
      - CORE_CONF_fs_defaultFS=${CORE_CONF_fs_defaultFS}
    volumes:
      - namenode-data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode3
    depends_on:
      - namenode
    environment:
      - HDFS_NAMENODE_USER=${HDFS_NAMENODE_USER}
      - HDFS_DATANODE_USER=${HDFS_DATANODE_USER}
      - HDFS_SECONDARYNAMENODE_USER=${HDFS_SECONDARYNAMENODE_USER}
      - YARN_RESOURCEMANAGER_USER=${YARN_RESOURCEMANAGER_USER}
      - YARN_NODEMANAGER_USER=${YARN_NODEMANAGER_USER}
      - CORE_CONF_fs_defaultFS=${CORE_CONF_fs_defaultFS}
    volumes:
      - datanode-data:/hadoop/dfs/data
  # ── Spark ────────────────────────────────────────────────────
  # Migrated from bde2020/spark-master:3.0.0-hadoop3.2
  # to the official Apache image (Ubuntu-based, Python 3.10+).
  # Master and worker use the same image, differentiated by command.
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master3
    ports:
      - '8083:8080'   # Spark Web UI
      - '7079:7077'   # Spark master port
    depends_on:
      - namenode
      - datanode
    environment:
      - SPARK_MASTER_HOST=spark-master3
      - PYSPARK_PYTHON=python3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    user: root

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker3
    depends_on:
      - spark-master
    environment:
      # SPARK_WORKER_CORES and SPARK_WORKER_MEMORY are passed as -c/-m
      # command flags below — keep them in your .env file as-is
      - SPARK_EXECUTOR_MEMORY=${SPARK_WORKER_MEMORY}
      - PYSPARK_PYTHON=python3
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      -c ${SPARK_WORKER_CORES}
      -m ${SPARK_WORKER_MEMORY}
      spark://spark-master3:7077
    user: root
    mem_limit: 5g

  # ── ClickHouse ───────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse3
    ports:
      - '8125:8123'
      - '9003:9000'
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    mem_limit: 8g
    cpus: '2'

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana3
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
    volumes:
      - grafana-data:/var/lib/grafana

  # ── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper3
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka3
    depends_on:
      - zookeeper
    ports:
      - '9094:9094'
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper3:${ZOOKEEPER_CLIENT_PORT}
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka3:29092,PLAINTEXT_HOST://127.0.0.1:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}

volumes:
  clickhouse-data:
  grafana-data:
  namenode-data:
  datanode-data: